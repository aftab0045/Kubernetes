apiVersion: v1
kind: ReplicationController
metadata: 
  name: myRC
spec:
  replicas: 4
  selector: 
    app: myapp
  template: 
    metadata: 
      name: myapp
      labels:
        app: myapp
    spec:
      containers:
        - name: mycontainer
          image: nginx
          ports:
            - containerPort: 80      
