apiVersion: app/v1
kind: ReplicaSet
metadata:
  name: myrs
spec:
  replicas: 3
  selector:
    matchExpressions:
      - key: env
        operator: In
        values: ["dev","prod"]
  template: 
    metadata:
      labels:
        env: prod
    spec: 
      containers:
        - name: myapp
          image: nginx
          ports:
            - containerPort: 80            